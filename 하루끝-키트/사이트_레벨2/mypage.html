<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>내 세션 — 이어</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{ --ink:#2b2b28; --soft:#5c574e; --muted:#9a9489; --line:#e3ddd2;
    --paper:#faf8f3; --card:#ffffff; --accent:#b9784f; }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--paper); color:var(--ink);
    font-family:"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    line-height:1.6; font-size:15px;}
  .wrap{max-width:1000px; margin:0 auto; padding:0 22px;}
  header{padding:40px 0; border-bottom:1px solid var(--line);}
  h1{margin:0; font-size:28px; font-weight:600;}
  .subheader{color:var(--soft); font-size:14px; margin-top:6px;}
  .filter{display:flex; gap:12px; margin:20px 0; flex-wrap:wrap;}
  input[type=text]{border:1px solid var(--line); border-radius:8px; padding:10px 14px; font-size:14px;}
  .list{margin-top:20px;}
  .item{background:var(--card); border:1px solid var(--line); border-radius:10px; padding:18px; margin-bottom:14px;}
  .item:hover{border-color:var(--accent); box-shadow:0 2px 8px rgba(0,0,0,0.05);}
  .item-header{display:flex; justify-content:space-between; align-items:start; margin-bottom:10px;}
  .item-title{font-weight:600; color:var(--ink);}
  .item-date{color:var(--muted); font-size:13px;}
  .item-text{color:var(--soft); font-size:14px; line-height:1.6; margin:10px 0;}
  .item-meta{display:flex; gap:20px; color:var(--muted); font-size:13px; margin-top:10px;}
  .status-badge{display:inline-block; padding:4px 10px; border-radius:12px; font-size:12px; font-weight:600;}
  .status-recorded{background:#eef2e8; color:#566b41;}
  .status-mirrored{background:#e8f4fd; color:#0066cc;}
  .loading{text-align:center; color:var(--muted); padding:40px 0;}
  .error{background:#fee; border:1px solid #fcc; border-radius:8px; padding:14px; color:#c00; margin:20px 0;}
  .empty{text-align:center; color:var(--muted); padding:60px 0;}
  .btn{display:inline-block; padding:10px 16px; background:var(--accent); color:#fff; border:none; border-radius:8px; cursor:pointer; font-size:14px; text-decoration:none;}
  .btn:hover{opacity:0.9;}
  #login-section{display:flex; align-items:center; justify-content:center; min-height:60vh;}
  .login-box{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:40px; text-align:center; max-width:400px;}
  .login-box h2{margin:0 0 12px; font-size:24px;}
  .login-box p{color:var(--soft); margin:0 0 32px;}
  #g_id_onload{margin-top:24px;}
  footer{padding:40px 0; border-top:1px solid var(--line); color:var(--muted); font-size:13px; text-align:center;}
  .top-nav{border-bottom:1px solid var(--line); background:#fff; position:sticky; top:0; z-index:100;}
  .top-nav .wrap{display:flex; gap:0; padding:0 22px;}
  .top-nav a{padding:18px 22px; text-decoration:none; color:var(--muted); font-size:14px; border-bottom:2px solid transparent; transition:all .2s;}
  .top-nav a:hover{color:var(--soft);}
  .top-nav a.active{color:var(--ink); border-bottom-color:var(--accent);}
</style>
</head>
<body>
<nav class="top-nav">
  <div class="wrap">
    <a href="session.html">기록하기</a>
    <a href="admin.html">관리자</a>
    <a href="mypage.html" class="active">나의 페이지</a>
  </div>
</nav>
<div class="wrap">
  <header>
    <h1>📝 내 세션</h1>
    <div class="subheader">내가 만든 모든 세션 기록</div>
  </header>

  <!-- 로그인 화면 -->
  <div id="login-section">
    <div class="login-box">
      <h2>관리자 전용</h2>
      <p>구글 계정으로 로그인하세요</p>
      <div id="g_id_onload"
        data-client_id="71496735255-mr285j4cas006tli8di6lqm0e6p5d765.apps.googleusercontent.com"
        data-callback="handleCredentialResponse">
      </div>
      <div id="g_id_signin" data-type="standard" data-size="large" data-theme="outline"></div>
    </div>
  </div>

  <!-- 세션 목록 -->
  <div id="sessions-section" style="display:none;">
    <div class="filter">
      <input type="text" id="searchInput" placeholder="이름, 감각으로 검색...">
      <button class="btn" onclick="loadSessions()">새로고침</button>
      <button class="btn" onclick="logout()" style="background:#e74c3c; color:white; border:none;">로그아웃</button>
    </div>

    <div class="list" id="list">
      <div class="loading">로딩 중...</div>
    </div>
  </div>

  <footer>
    © 2026 이어 — 당신의 말을 정돈해 비춰드려요
  </footer>
</div>

<script src="mypage-functions.js"></script>
<script>
  // Initialize Google Identity Services
  window.addEventListener('load', function() {
    try {
      google.accounts.id.initialize({
        client_id: '71496735255-mr285j4cas006tli8di6lqm0e6p5d765.apps.googleusercontent.com',
        callback: handleCredentialResponse
      });
      google.accounts.id.renderButton(
        document.getElementById('g_id_signin'),
        { theme: 'outline', size: 'large' }
      );
    } catch (e) {
      console.error('Google Identity Services failed to load:', e);
    }
  });

  document.addEventListener('DOMContentLoaded', function() {
    checkAuth();
    var searchInput = document.getElementById('searchInput');
    if (searchInput) {
      searchInput.addEventListener('keyup', function() {
        filterSessions(this.value);
      });
    }
  });
</script>
</body>
</html>
